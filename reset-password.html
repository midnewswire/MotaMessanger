<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password | Mota Messenger</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    .card {
      background: white;
      padding: 32px;
      border-radius: 16px;
      width: 380px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      animation: fadeIn 0.5s ease-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    h2 {
      color: #333;
      text-align: center;
      margin-bottom: 24px;
      font-weight: 600;
    }
    input {
      width: 100%;
      padding: 14px 16px;
      margin: 10px 0;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 16px;
      transition: border-color 0.3s;
      box-sizing: border-box;
    }
    input:focus {
      outline: none;
      border-color: #667eea;
    }
    button {
      width: 100%;
      padding: 14px;
      margin-top: 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
    }
    button:active {
      transform: translateY(0);
    }
    button:disabled {
      background: #ccc;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }
    .message {
      margin-top: 20px;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      text-align: center;
      animation: slideIn 0.3s ease-out;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .error {
      background-color: #fee;
      color: #c33;
      border: 1px solid #fcc;
    }
    .success {
      background-color: #efe;
      color: #2a7;
      border: 1px solid #cfc;
    }
    .logo {
      text-align: center;
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 30px;
      font-size: 14px;
    }
    .password-strength {
      height: 4px;
      background: #eee;
      border-radius: 2px;
      margin: 5px 0 15px 0;
      overflow: hidden;
    }
    .strength-bar {
      height: 100%;
      width: 0%;
      transition: width 0.3s, background-color 0.3s;
    }
    .weak { width: 33%; background-color: #ff4757; }
    .medium { width: 66%; background-color: #ffa502; }
    .strong { width: 100%; background-color: #2ed573; }
  </style>
</head>
<body>

<div class="card">
  <div class="logo">Mota Messenger</div>
  <p class="subtitle">Reset your password securely</p>
  
  <h2>Reset Password</h2>
  
  <input type="password" id="password" placeholder="New password (min. 6 characters)" />
  <div class="password-strength">
    <div class="strength-bar" id="strengthBar"></div>
  </div>
  
  <input type="password" id="confirm" placeholder="Confirm new password" />
  
  <button id="resetBtn" onclick="resetPassword()">Update Password</button>
  
  <div id="msg" class="message"></div>
</div>

<script>
  // ✅ CRITICAL FIX 1: Use correct global variable 'supabase' (not supabaseJs)
  const supabase = window.supabase.createClient(
    'https://uiqkawnkputtdovffnyo.supabase.co',  // Replace with your actual project URL
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVpcWthd25rcHV0dGRvdmZmbnlvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQ0MTQ2OTcsImV4cCI6MjA3OTk5MDY5N30.4Fvjj9quJhmrWAvt1SD8yJeQAl_wfpOGuNB7xvkcsyU'  // Replace with your actual anon key from Supabase → Settings → API
  );

  const msg = document.getElementById('msg');
  const resetBtn = document.getElementById('resetBtn');
  const passwordInput = document.getElementById('password');
  const strengthBar = document.getElementById('strengthBar');

  function showError(text) {
    msg.innerText = text;
    msg.className = 'message error';
    resetBtn.disabled = false;
    resetBtn.textContent = 'Update Password';
  }

  function showSuccess(text) {
    msg.innerText = text;
    msg.className = 'message success';
  }

  // Password strength indicator
  passwordInput.addEventListener('input', function() {
    const password = this.value;
    if (password.length === 0) {
      strengthBar.className = 'strength-bar';
      strengthBar.style.width = '0%';
    } else if (password.length < 6) {
      strengthBar.className = 'strength-bar weak';
    } else if (password.length < 10) {
      strengthBar.className = 'strength-bar medium';
    } else {
      strengthBar.className = 'strength-bar strong';
    }
  });

  // ✅ CRITICAL FIX 2: Proper async session restoration with error handling
  (async function initialize() {
    try {
      const hash = window.location.hash.substring(1);
      const params = new URLSearchParams(hash);

      const type = params.get('type');
      const accessToken = params.get('access_token');
      const refreshToken = params.get('refresh_token');

      // Validate reset link
      if (type !== 'recovery' || !accessToken || !refreshToken) {
        showError('Invalid or expired reset link. Please request a new password reset email.');
        resetBtn.disabled = true;
        return;
      }

      // Set Supabase session
      const { error } = await supabase.auth.setSession({
        access_token: accessToken,
        refresh_token: refreshToken,
      });

      if (error) {
        showError(`Session error: ${error.message}. Please request a new reset link.`);
        resetBtn.disabled = true;
        return;
      }

      console.log('Session restored successfully');
      
    } catch (error) {
      console.error('Initialization error:', error);
      showError('Failed to initialize. Please refresh the page.');
    }
  })();

  async function resetPassword() {
    const password = document.getElementById('password').value;
    const confirm = document.getElementById('confirm').value;

    // Validate inputs
    if (!password || password.length < 6) {
      showError('Password must be at least 6 characters.');
      return;
    }

    if (password !== confirm) {
      showError('Passwords do not match.');
      return;
    }

    resetBtn.disabled = true;
    resetBtn.textContent = 'Updating...';

    let success = false;

    try {
      const { error } = await supabase.auth.updateUser({ password: password });

      if (error) {
        showError(`Update failed: ${error.message}`);
        return;
      }

      success = true;
      showSuccess('✅ Password updated successfully! Redirecting...');
      await supabase.auth.signOut();
      setTimeout(() => { window.location.href = 'index.html'; }, 2000);

    } catch (error) {
      console.error('Password reset error:', error);
      showError('An unexpected error occurred. Please try again.');
    } finally {
      if (!success) {
        resetBtn.disabled = false;
        resetBtn.textContent = 'Update Password';
      }
    }
  }

  // Allow form submission with Enter key
  document.addEventListener('keypress', function(event) {
    if (event.key === 'Enter') {
      resetPassword();
    }
  });
</script>

</body>
</html>
